[package]
name = "pux"
version = "0.1.0"
edition = "2021"
rust-version = "1.93"
publish = false
description = "Streaming, resumable, space-efficient extractor for compressed archives downloaded over HTTP."

[lib]
name = "pux"
path = "src/lib.rs"

[[bin]]
name = "pux"
path = "src/main.rs"

[dependencies]
thiserror = "2"

[dev-dependencies]

[profile.release]
debug = "line-tables-only"
lto = "thin"
