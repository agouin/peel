# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
#
# Goals:
#   - Permissive licenses only (the dependency policy in
#     internal/ENGINEERING_STANDARDS.md is conservative; this enforces it).
#   - No known security advisories.
#   - No unknown registries or git sources.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    # Mozilla's CA root bundle (shipped by `webpki-roots`, the TLS
    # trust store approved in `internal/ENGINEERING_STANDARDS.md` §2.4)
    # is published under CDLA-Permissive-2.0. The license is
    # permissive (no copyleft, no patent grant restrictions beyond
    # the data itself) and applies only to the embedded root list.
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
