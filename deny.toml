# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
#
# Goals:
#   - Permissive licenses only (the dependency policy in
#     docs/ENGINEERING_STANDARDS.md is conservative; this enforces it).
#   - No known security advisories.
#   - No unknown registries or git sources.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
