name: Docker

# Tag-driven builds (`v*.*.*`) are handled by `release.yml`'s `docker`
# job so the per-arch image digests can flow into the release notes
# atomically with the rest of the release. This workflow only handles
# non-tag (branch) pushes — the `main` / feature-branch images
# published to `ghcr.io/<owner>/peel:<branch>` for in-development pulls.
on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (e.g. v0.1.0). Mostly redundant with release.yml; use only to backfill an image for a tag that release.yml missed.'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/peel
          tags: |
            type=ref,event=branch
            type=semver,pattern={{raw}},value=${{ steps.tag.outputs.tag }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest,enable=${{ steps.tag.outputs.tag != '' && !contains(steps.tag.outputs.tag, '-') }}

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
