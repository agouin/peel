name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install musl toolchain
        if: contains(matrix.target, '-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

      - name: Build
        env:
          # Routes cc-rs (used by zstd-sys / lzma-sys / ring) to musl-gcc when
          # building for a musl target. Harmless on non-musl jobs since cc-rs
          # only consults the per-target var when that target is being built.
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
        run: cargo build --release --locked --target ${{ matrix.target }} --bin peel

      - name: Generate man page
        # Built host-native (no --target) because the output is
        # architecture-independent troff and we just need it on disk
        # for the Package step. See `src/bin/peel-mangen.rs` and
        # `internal/PLAN_packaging.md` §0.2 for why this is a bin
        # gated by the `man-page` feature rather than a dev-dep
        # example (examples pull in every dev-dep — including the
        # heavy xz2 → lzma-sys C compile — which a bin avoids).
        run: cargo run --release --bin peel-mangen --features man-page --locked -- target/man/peel.1

      - name: Strip binary
        # Hoisted out of the Package step so the cargo-deb step below
        # consumes the stripped binary too. All matrix hosts can strip
        # their own architecture (the GHA runners are native, not
        # cross): ubuntu-22.04 → x86_64, ubuntu-22.04-arm → aarch64,
        # macos-14 → aarch64-darwin.
        run: strip target/${{ matrix.target }}/release/peel

      - name: Install cargo-deb
        # Only the standard Debian/Ubuntu architectures (x86_64-gnu,
        # aarch64-gnu) get a `.deb`. musl-libc binaries on a glibc
        # Debian system are an oddball case we don't bless, and macOS
        # is irrelevant. See `internal/PLAN_packaging.md` §2.4.
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cargo-deb --version "^2" --locked

      - name: Build .deb
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu'
        # `--no-build` skips rebuilding (we already built above).
        # `--no-strip` skips cargo-deb's own strip (the previous step
        # did it). Config lives in `[package.metadata.deb]` in
        # Cargo.toml. Output lands at
        # `target/<triple>/debian/peel_<version>-1_<arch>.deb`.
        run: cargo deb --no-build --no-strip --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          name="peel-${tag}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"

          bin="target/${{ matrix.target }}/release/peel"
          cp "${bin}" "${staging}/"
          cp README.md "${staging}/"
          # Distro packaging (PLAN_packaging.md §0.5) expects LICENSE-MIT,
          # LICENSE-APACHE, and NOTICE at the top of `/usr/share/doc/peel/`
          # or `/usr/share/licenses/peel/`. Shipping them in every release
          # tarball means each spec/PKGBUILD/APKBUILD just `install -Dm0644`s
          # what's already on disk.
          cp LICENSE-MIT LICENSE-APACHE NOTICE "${staging}/"
          # Man page generated in the previous step; arch-independent troff.
          install -Dm0644 target/man/peel.1 "${staging}/share/man/man1/peel.1"

          ( cd dist && tar -czf "${name}.tar.gz" "${name}" )
          rm -rf "${staging}"

          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )

          # If the cargo-deb step ran for this matrix entry, copy the
          # resulting `.deb` into `dist/` so the artifact upload picks
          # it up. The matrix-gate above ensures this only runs for
          # the gnu Linux targets.
          deb_dir="target/${{ matrix.target }}/debian"
          if compgen -G "${deb_dir}/*.deb" > /dev/null; then
            cp "${deb_dir}"/*.deb dist/
            ( cd dist && shasum -a 256 *.deb > peel-${tag}-${{ matrix.target }}.deb.sha256 )
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: peel-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.deb
            dist/*.deb.sha256
          if-no-files-found: error
          retention-days: 7

  # Pre-vendored crates tarball, consumed by every distro-package job
  # below and also shipped as a release asset. Most distro build
  # environments are network-isolated (Fedora mock, Debian sbuild,
  # Alpine abuild), so cargo cannot fetch from crates.io during the
  # build; shipping a vendored copy lets each spec / debian/rules /
  # APKBUILD use a one-line `.cargo/config.toml` redirect. See
  # `internal/PLAN_packaging.md` §0.3.
  vendor:
    name: Vendor crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Vendor dependencies
        # `--versioned-dirs` keeps multiple versions of the same crate
        # from colliding (defensive; uncommon in the current tree).
        # cargo writes progress to stderr and the
        # `[source.crates-io] / [source.vendored-sources]` snippet to
        # stdout — we save the snippet next to the `vendor/` dir so
        # distros have a drop-in `.cargo/config.toml`. Vendoring to
        # the relative path `vendor` (not the staging dir) keeps the
        # `directory = ...` line in the snippet relative — i.e. the
        # path the distro sees after extracting the tarball — then
        # we move the directory into staging for packaging.
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          name="peel-${tag}-vendored"
          staging="dist/${name}"
          mkdir -p "${staging}"
          cargo vendor --locked --versioned-dirs vendor \
            > "${staging}/cargo-vendor-config.toml"
          mv vendor "${staging}/vendor"
          ( cd dist && tar -czf "${name}.tar.gz" "${name}" )
          rm -rf "${staging}"
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: peel-vendor
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  # Fedora binary + source RPMs built from `packaging/fedora/peel.spec`.
  # Per-architecture matrix because rpmbuild compiles the binary, so
  # the runner has to be the right native arch. See
  # `packaging/fedora/README.md` and `internal/PLAN_packaging.md` §1.
  package-fedora:
    name: Fedora .rpm (${{ matrix.arch }})
    needs: vendor
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-22.04
          - arch: aarch64
            runs-on: ubuntu-22.04-arm
    runs-on: ${{ matrix.runs-on }}
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install build deps
        # `rust-toolset` / `rust` packages on Fedora don't always
        # satisfy the spec's `BuildRequires: rust >= 1.85` (Fedora 41
        # ships 1.81). Install 1.95 via rustup to match the
        # `rust-toolchain.toml` pin used in CI.
        run: |
          dnf -y -q install rpm-build pkgconf-pkg-config libzstd-devel \
              gcc git tar rustup
          rustup-init -y --default-toolchain 1.95.0 --profile minimal \
              --no-modify-path > /dev/null 2>&1
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Download vendored crates
        uses: actions/download-artifact@v4
        with:
          name: peel-vendor
          path: vendor-artifact

      - name: Stage rpmbuild sources
        # Source0: github-style archive of the tagged tree. Source1:
        # the vendored-deps tarball produced by the `vendor` job.
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          ver="${tag#v}"
          mkdir -p /github/home/rpmbuild/SOURCES /github/home/rpmbuild/SPECS
          # `safe.directory` keeps `git archive` from refusing to read
          # the workspace inside the container (git complains about
          # ownership when the on-disk uid doesn't match the container
          # user).
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git archive --prefix="peel-${ver}/" HEAD \
              -o "/github/home/rpmbuild/SOURCES/peel-${ver}.tar.gz"
          # `find` rather than a fixed path: actions/upload-artifact@v4
          # may strip the workspace-relative `dist/` prefix from the
          # artifact, so the vendored tarball can end up at the top of
          # `vendor-artifact/` or under `vendor-artifact/dist/`
          # depending on action version. The find is robust to either.
          vendored=$(find vendor-artifact -name 'peel-*-vendored.tar.gz' | head -1)
          test -n "${vendored}" || { echo "vendored tarball not found"; exit 1; }
          cp "${vendored}" "/github/home/rpmbuild/SOURCES/peel-${tag}-vendored.tar.gz"
          cp packaging/fedora/peel.spec /github/home/rpmbuild/SPECS/peel.spec

      - name: Build RPMs
        # `--nocheck` skips the spec's `%check` step (cargo test) —
        # the main CI workflow already runs tests on every push, and
        # %check would re-trigger the heavy xz2 → lzma-sys dev-dep
        # build chain just to repeat what ci.yml already verified.
        # `--nodeps` because the rust toolchain came from rustup, not
        # dnf, so the `rust >= 1.85` BuildRequires can't see it.
        shell: bash
        run: |
          export HOME=/github/home
          rpmbuild -bs ~/rpmbuild/SPECS/peel.spec
          rpmbuild -bb --nocheck --nodeps ~/rpmbuild/SPECS/peel.spec

      - name: Stage outputs
        # The `.src.rpm` is arch-independent and gets rebuilt
        # identically by both matrix branches. Ship it from one
        # branch only so the publish job doesn't see two upload
        # candidates for the same filename. x86_64 is the conventional
        # arbiter.
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          if [[ "${{ matrix.arch }}" == "x86_64" ]]; then
            cp /github/home/rpmbuild/SRPMS/peel-*.src.rpm dist/
          fi
          cp "/github/home/rpmbuild/RPMS/${{ matrix.arch }}/"peel-*.rpm dist/
          ( cd dist && sha256sum *.rpm > "peel-fedora-${{ matrix.arch }}.sha256" )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: peel-fedora-${{ matrix.arch }}
          path: |
            dist/*.rpm
            dist/peel-fedora-${{ matrix.arch }}.sha256
          if-no-files-found: error
          retention-days: 7

  # Debian source package (`.dsc` + `.orig.tar.gz` + `.debian.tar.xz`)
  # for PPA upload. Architecture-independent — sponsors / Launchpad
  # build farms compile per-arch on their side. The cargo-deb path in
  # the `build` matrix produces the drop-in user-facing `.deb`; this
  # job produces the source-package material a Debian sponsor / PPA
  # would consume. See `packaging/debian/README.md`.
  package-debian-source:
    name: Debian source package
    needs: vendor
    runs-on: ubuntu-22.04
    container: debian:trixie
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install build deps
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
              build-essential debhelper devscripts dpkg-dev fakeroot \
              git ca-certificates xz-utils > /dev/null

      - name: Download vendored crates
        uses: actions/download-artifact@v4
        with:
          name: peel-vendor
          path: vendor-artifact

      - name: Stage and build source package
        # The Debian source package consists of:
        #   peel_<version>.orig.tar.gz     — upstream source (incl. vendor/)
        #   peel_<version>-1.debian.tar.xz — debian/ as a quilt-style diff
        #   peel_<version>-1.dsc           — control manifest
        # We assemble the orig tarball from `git archive` + the vendored
        # tarball, drop `packaging/debian/` in as the debian/ tree, then
        # `dpkg-buildpackage -S` produces the .dsc + the debian.tar.xz.
        #
        # Build flags: `-S` is source-only (no binary build), `-us -uc`
        # skips signing (PPA upload signs separately on the maintainer
        # host), `-d` skips Build-Depends check — we don't install the
        # rust toolchain in this job because we're producing source
        # material, not a binary build.
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          ver="${tag#v}"
          work=/tmp/peel-deb-stage
          rm -rf "${work}" && mkdir -p "${work}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git archive --prefix="peel-${ver}/" HEAD | tar -x -C "${work}"
          # Locate the vendored tarball regardless of whether
          # upload-artifact preserved the workspace-relative `dist/`
          # prefix in the artifact zip.
          vendored=$(find vendor-artifact -name 'peel-*-vendored.tar.gz' | head -1)
          test -n "${vendored}" || { echo "vendored tarball not found"; exit 1; }
          tar -xzf "${vendored}" -C "${work}/peel-${ver}" --strip-components=1
          cp -r packaging/debian "${work}/peel-${ver}/debian"
          ( cd "${work}" && tar --exclude="peel-${ver}/debian" \
              -czf "peel_${ver}.orig.tar.gz" "peel-${ver}/" )
          cd "${work}/peel-${ver}"
          dpkg-buildpackage -S -us -uc -d

      - name: Stage outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp /tmp/peel-deb-stage/peel_*.dsc dist/
          cp /tmp/peel-deb-stage/peel_*.orig.tar.gz dist/
          cp /tmp/peel-deb-stage/peel_*.debian.tar.xz dist/
          cp /tmp/peel-deb-stage/peel_*_source.changes dist/
          # Per-file checksums; the publish job rolls all of these up
          # into SHA256SUMS.
          ( cd dist && sha256sum peel_*.dsc peel_*.orig.tar.gz \
              peel_*.debian.tar.xz peel_*_source.changes \
              > peel-debian-source.sha256 )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: peel-debian-source
          path: |
            dist/peel_*.dsc
            dist/peel_*.orig.tar.gz
            dist/peel_*.debian.tar.xz
            dist/peel_*_source.changes
            dist/peel-debian-source.sha256
          if-no-files-found: error
          retention-days: 7

  # Alpine `.apk` built from `packaging/alpine/APKBUILD`. Matrix-fanned
  # across x86_64 and aarch64 because abuild compiles the binary in the
  # chroot, so the runner has to be the right native arch. See
  # `packaging/alpine/README.md` and `internal/PLAN_packaging.md` §5.
  package-alpine:
    name: Alpine .apk (${{ matrix.arch }})
    needs: vendor
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-22.04
          - arch: aarch64
            runs-on: ubuntu-22.04-arm
    runs-on: ${{ matrix.runs-on }}
    container: alpine:latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: sh
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install build deps
        run: |
          apk add --no-cache alpine-sdk build-base abuild cargo rust \
              zstd-dev pkgconf coreutils git tar

      - name: Set up abuild user
        # abuild refuses to run as root. Create a `builder` user, seed
        # its abuild key, and run all subsequent build steps under it.
        run: |
          set -ex
          addgroup -S builder 2>/dev/null || true
          adduser -S -G builder builder 2>/dev/null || true
          addgroup builder abuild 2>/dev/null || true
          su builder -s /bin/sh -c 'abuild-keygen -a -n' || true
          cp /home/builder/.abuild/*.rsa.pub /etc/apk/keys/

      - name: Download vendored crates
        uses: actions/download-artifact@v4
        with:
          name: peel-vendor
          path: vendor-artifact

      - name: Stage sources + patch APKBUILD
        # abuild fetches sources from `source=` URLs by default, but we
        # pre-populate the distfiles cache with locally-staged files so
        # it short-circuits the network fetch and uses our copies.
        # The vendored tarball doesn't exist on the upstream release
        # yet during the *first* run that produces it (this is the
        # workflow producing the release), so caching is mandatory.
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          ver="${tag#v}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          mkdir -p /var/cache/distfiles /tmp/build
          # Source0: github-style archive of the tagged tree.
          git archive --prefix="peel-${ver}/" HEAD \
              -o "/var/cache/distfiles/peel-${ver}.tar.gz"
          # Source1: vendored crates from the `vendor` job artifact.
          vendored=$(find vendor-artifact -name 'peel-*-vendored.tar.gz' | head -1)
          test -n "${vendored}" || { echo "vendored tarball not found"; exit 1; }
          cp "${vendored}" "/var/cache/distfiles/peel-v${ver}-vendored.tar.gz"
          chmod a+r /var/cache/distfiles/*
          # Patch APKBUILD's sha512sums block with the just-computed
          # checksums. Use python over sed because the multi-line block
          # is awkward to express in sed portably.
          SHA1=$(sha512sum "/var/cache/distfiles/peel-${ver}.tar.gz" | awk '{print $1}')
          SHA2=$(sha512sum "/var/cache/distfiles/peel-v${ver}-vendored.tar.gz" | awk '{print $1}')
          cp packaging/alpine/APKBUILD /tmp/build/APKBUILD
          python3 - "${SHA1}" "${SHA2}" "${ver}" <<'PY'
          import re, sys
          sha1, sha2, ver = sys.argv[1:]
          p = "/tmp/build/APKBUILD"
          content = open(p).read()
          new_block = (
              f'sha512sums="\n'
              f'{sha1}  peel-{ver}.tar.gz\n'
              f'{sha2}  peel-v{ver}-vendored.tar.gz\n'
              f'"'
          )
          content = re.sub(r'sha512sums="[^"]*"', new_block, content,
                           count=1, flags=re.DOTALL)
          open(p, "w").write(content)
          PY
          chown -R builder:builder /tmp/build

      - name: Build .apk
        # `-F` forces abuild to run despite being invoked from a non-aports
        # checkout. `REPODEST` controls where built .apk files land.
        shell: bash
        run: |
          set -euo pipefail
          su builder -s /bin/sh -c '
            cd /tmp/build &&
            REPODEST=/tmp/packages abuild -r -F
          '

      - name: Stage outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find /tmp/packages -name 'peel-*.apk' -exec cp {} dist/ \;
          ( cd dist && sha256sum peel-*.apk > "peel-alpine-${{ matrix.arch }}.sha256" )
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: peel-alpine-${{ matrix.arch }}
          path: |
            dist/peel-*.apk
            dist/peel-alpine-${{ matrix.arch }}.sha256
          if-no-files-found: error
          retention-days: 7

  # Arch `.pkg.tar.zst` built from `packaging/aur/peel/PKGBUILD`. Arch's
  # official distribution is x86_64-only (Arch Linux ARM is a separate
  # community project, served by AUR rebuilds on user machines), so we
  # don't matrix-fan this one. See `packaging/aur/README.md` and
  # `internal/PLAN_packaging.md` §4.
  package-arch:
    name: Arch .pkg.tar.zst
    needs: vendor
    runs-on: ubuntu-22.04
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install build deps + create builder user
        # `makepkg` refuses to run as root. Provision a `builder` user
        # with passwordless sudo so the build can pacman-install
        # makedepends. base-devel includes the standard PKGBUILD
        # toolchain (fakeroot, sudo, etc.).
        shell: bash
        run: |
          set -ex
          pacman -Syu --noconfirm --noprogressbar \
              base-devel rust cargo zstd pkgconf git > /dev/null
          useradd -m -G wheel builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - name: Stage sources + patch PKGBUILD
        # Drop the upstream-source archive into the build dir at the
        # exact name PKGBUILD's `source=` line references so makepkg
        # uses it instead of fetching from GitHub. Same caching shape
        # as the Alpine job above.
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          ver="${tag#v}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          mkdir -p /home/builder/build
          cp packaging/aur/peel/PKGBUILD /home/builder/build/PKGBUILD
          git archive --prefix="peel-${ver}/" HEAD \
              -o "/home/builder/build/peel-${ver}.tar.gz"
          # PKGBUILD's `source=` array uses
          # `peel-${pkgver}.tar.gz::<URL>` which makepkg parses as
          # "rename to peel-<ver>.tar.gz, fetch from URL". With the
          # file already at that path it skips the fetch when sha
          # matches.
          SHA0=$(sha256sum "/home/builder/build/peel-${ver}.tar.gz" | awk '{print $1}')
          # Replace the single-element sha256sums tuple. The PKGBUILD
          # ships as `sha256sums=('SKIP')`.
          sed -i "s|^sha256sums=(.*|sha256sums=('${SHA0}')|" \
              /home/builder/build/PKGBUILD
          chown -R builder:builder /home/builder/build

      - name: Build .pkg.tar.zst
        shell: bash
        run: |
          set -euo pipefail
          # `--syncdeps` installs missing makedepends, `--rmdeps`
          # removes them after the build, `--nocheck` skips the
          # PKGBUILD's `check()` (cargo test) for the same reason
          # the Fedora and Alpine builds skip theirs.
          su builder -c '
            cd /home/builder/build &&
            makepkg --noconfirm --syncdeps --rmdeps --nocheck
          '

      - name: Stage outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp /home/builder/build/peel-*.pkg.tar.zst dist/
          ( cd dist && sha256sum peel-*.pkg.tar.zst > peel-arch.sha256 )
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: peel-arch
          path: |
            dist/peel-*.pkg.tar.zst
            dist/peel-arch.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish release
    needs: [build, vendor, package-fedora, package-debian-source, package-alpine, package-arch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate checksums
        # SHA256SUMS rolls up every per-file checksum file into one,
        # so a downloader can verify the whole release with one
        # `shasum -c SHA256SUMS`. The producing jobs each emit a
        # `*.sha256` file; we concatenate all of them (skipping
        # SHA256SUMS itself if a prior run left one behind).
        shell: bash
        run: |
          set -euo pipefail
          ( cd dist && find . -maxdepth 1 -name '*.sha256' ! -name 'SHA256SUMS' \
              | sort | xargs cat > SHA256SUMS )

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"

          prerelease_flag=""
          if [[ "${tag}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi

          # `nullglob` makes empty globs expand to nothing instead of
          # the literal pattern. Every glob below is allowed to be
          # empty in principle, but in practice the matrix would fail
          # loudly before publish runs if a tarball or RPM was missing.
          shopt -s nullglob
          assets=(
            # Per-target binary tarballs (build matrix).
            dist/peel-*.tar.gz dist/peel-*.tar.gz.sha256
            # Drop-in .deb from cargo-deb (build matrix, gnu Linux only).
            dist/peel_*.deb dist/peel-*.deb.sha256
            # Fedora RPMs (binary + source).
            dist/peel-*.rpm dist/peel-fedora-*.sha256
            # Debian source package material (PPA upload).
            dist/peel_*.dsc dist/peel_*.orig.tar.gz dist/peel_*.debian.tar.xz
            dist/peel_*_source.changes dist/peel-debian-source.sha256
            # Alpine .apk (main + -doc subpackage, per arch).
            dist/peel-*.apk dist/peel-alpine-*.sha256
            # Arch .pkg.tar.zst (x86_64 only — Arch Linux ARM users
            # build from AUR on their side).
            dist/peel-*.pkg.tar.zst dist/peel-arch.sha256
            # Aggregate checksums.
            dist/SHA256SUMS
          )

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
          else
            gh release create "${tag}" \
              --title "${tag}" \
              --verify-tag \
              --generate-notes \
              ${prerelease_flag} \
              "${assets[@]}"
          fi
