name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install musl toolchain
        if: contains(matrix.target, '-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

      - name: Build
        env:
          # Routes cc-rs (used by zstd-sys / lzma-sys / ring) to musl-gcc when
          # building for a musl target. Harmless on non-musl jobs since cc-rs
          # only consults the per-target var when that target is being built.
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
        run: cargo build --release --locked --target ${{ matrix.target }} --bin peel

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          name="peel-${tag}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"

          bin="target/${{ matrix.target }}/release/peel"
          strip "${bin}"
          cp "${bin}" "${staging}/"
          cp README.md "${staging}/"

          ( cd dist && tar -czf "${name}.tar.gz" "${name}" )
          rm -rf "${staging}"

          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: peel-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate checksums
        shell: bash
        run: |
          set -euo pipefail
          ( cd dist && cat *.tar.gz.sha256 > SHA256SUMS )

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"

          prerelease_flag=""
          if [[ "${tag}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi

          assets=( dist/*.tar.gz dist/*.tar.gz.sha256 dist/SHA256SUMS )

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
          else
            gh release create "${tag}" \
              --title "${tag}" \
              --verify-tag \
              --generate-notes \
              ${prerelease_flag} \
              "${assets[@]}"
          fi
